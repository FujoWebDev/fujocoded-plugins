name: Release Package

# Publish one specific workspace package through npm Trusted Publishing.
#
# Uses GitHub Actions OIDC (id-token: write) so npm authenticates the publish
# via provenance, the same mechanism as the normal Release workflow. No classic
# npm token or NPM_TOKEN secret is needed. The package must already exist on npm
# and have Trusted Publishing configured (run the bootstrap command first for
# brand-new packages).
#
# Runs through changesets/action so successful publishes get the same tag and
# GitHub Release behavior as the normal Release workflow. It must run on a
# versioned checkout with no pending changeset files; otherwise changesets/action
# would create/update a release PR instead of publishing. The published package
# must already have a CHANGELOG.md entry for its current version, because
# changesets/action uses that entry as the GitHub Release body.
#
# See .changeset/README.md for the local prepare/dispatch flow and cleanup steps.

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: "Public workspace package to publish"
        required: true
        type: string

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  id-token: write # Required for npm Trusted Publishing (OIDC)
  contents: write

jobs:
  release-package:
    name: Release Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Refuse pending changesets
        run: |
          if find .changeset -maxdepth 1 -type f -name '*.md' ! -name README.md | grep -q .; then
            echo "::error::Release Package must run on a versioned checkout with no pending changeset files."
            exit 1
          fi

      - name: Build
        run: npm run build

      - name: Print npm publish environment
        run: |
          node --version
          npm --version
          npm config get registry
          npm config get userconfig

      - name: Publish package
        uses: changesets/action@v1
        with:
          publish: node .github/workflows/scripts/release-package-publish.mjs
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_PACKAGE: ${{ inputs.package_name }}
